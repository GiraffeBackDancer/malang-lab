<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#fff7fb" />
  <title>왁뿌볼 부수기 — 왁뿌랜드</title>
  <meta name="description" content="꾹 눌러서 왁뿌볼 껍질을 와그작 깨뜨리고, 속까지 시원하게 으깨며 스트레스를 날려보는 왁뿌랜드의 부수기 게임." />
  <meta name="robots" content="index, follow" />
  <!-- 실제 배포 주소가 정해지면 wakppuland.netlify.app을 교체하세요 -->
  <link rel="canonical" href="https://wakppuland.netlify.app/smash.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="왁뿌랜드" />
  <meta property="og:title" content="왁뿌볼 부수기 — 왁뿌랜드" />
  <meta property="og:description" content="꾹 눌러서 나만의 왁뿌볼을 와그작 부수는 온라인 스트레스 해소 놀이." />
  <meta property="og:url" content="https://wakppuland.netlify.app/smash.html" />
  <meta property="og:locale" content="ko_KR" />
  <!-- 실제 배포 시 여기에 Google Analytics / AdSense 스니펫을 추가하세요 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="smash-page">
  <h1 class="seo-only">왁뿌볼 부수기 — 왁뿌랜드</h1>
  <p class="seo-only">
    꾹 눌러서 왁뿌볼 껍질을 와그작 깨뜨리고, 속까지 시원하게 으깨는 온라인 스트레스 해소 놀이예요.
    나만의 왁뿌볼 만들기에서 고른 색상과 바삭도·말랑도 점수에 따라 껍질이 갈라지는 손맛과 속을
    으깨는 손맛이 달라져요. 설치 없이 브라우저에서 바로 즐길 수 있어요.
  </p>

  <canvas id="smashCanvas"></canvas>

  <div class="hud">
    <a href="index.html" class="hud-brand">🎪 왁뿌볼 부수기</a>
    <div class="hud-tools">
      <button type="button" class="hud-btn" id="freezeBtn" aria-label="얼리기">🧊</button>
      <button type="button" class="hud-btn" id="muteBtn" aria-label="소리 켜기/끄기">🔊</button>
      <a href="maker.html" class="hud-btn" aria-label="다시 만들기">🧫</a>
    </div>
  </div>

  <p class="smash-hint" id="smashHint"><span class="pulse">꾹 눌러서 왁뿌볼을 부숴보세요 👆</span></p>

  <section id="brokenState" class="broken-state hidden">
    <h2>와장창! 다 부쉈어요! 🎉</h2>
    <p>오늘의 스트레스도 왁뿌볼과 함께 산산조각 났어요.</p>
    <div class="btn-row">
      <button type="button" id="resmashBtn" class="btn-secondary btn-block">🔁 한 번 더 부수기</button>
      <button type="button" id="remakeFromSmashBtn" class="btn-primary btn-block">🧫 다시 만들기</button>
    </div>
  </section>

  <section id="emptyState" class="empty-state hidden">
    <p>부술 왁뿌볼이 없어요!</p>
    <a href="maker.html" class="btn-primary">🧫 왁뿌볼 만들러 가기</a>
  </section>

  <div id="smashAdBox" class="ad-box hidden">광고 영역</div>

  <script src="script.js" defer></script>
</body>
</html>

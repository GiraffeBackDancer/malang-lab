<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>왁뿌볼 부수기 — 말랑연구소</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-container">
    <header class="site-header">
      <a href="index.html" class="logo">🧪 말랑연구소</a>
      <nav class="site-nav">
        <a href="index.html">홈</a>
        <a href="about.html">소개</a>
      </nav>
    </header>

    <main>
      <h1 style="text-align: center; font-size: 1.3rem">🔨 왁뿌볼 부수기</h1>
      <p class="smash-hint" id="smashHint">왁뿌볼을 눌러서 부숴보세요!</p>

      <section id="smashStage" class="smash-stage">
        <div id="ballPreview" class="wakppul-ball">
          <div class="ball-toppings" id="ballToppings"></div>
        </div>
      </section>

      <section id="brokenState" class="broken-state hidden">
        <h2>와장창! 다 부쉈어요! 🎉</h2>
        <p>오늘의 스트레스도 왁뿌볼과 함께 산산조각 났어요.</p>
        <div class="btn-row">
          <button type="button" id="resmashBtn" class="btn-secondary btn-block">🔁 한 번 더 부수기</button>
          <button type="button" id="remakeFromSmashBtn" class="btn-primary btn-block">🧫 다시 만들기</button>
        </div>
      </section>

      <section id="emptyState" class="empty-state hidden">
        <p>부술 왁뿌볼이 없어요!</p>
        <a href="maker.html" class="btn-primary">🧫 왁뿌볼 만들러 가기</a>
      </section>
    </main>

    <div id="smashAdBox" class="ad-box hidden">광고 영역</div>

    <footer class="site-footer">
      <p>🧪 말랑연구소 · <a href="about.html">이 사이트는 실제 제작법이 아닌 온라인 놀이용 시뮬레이터입니다</a></p>
    </footer>
  </div>

  <script src="script.js" defer></script>
</body>
</html>

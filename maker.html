<body>
  <div class="page-container" id="makerPage">
    <header class="site-header">
      <a href="index.html" class="logo">🎪 왁뿌랜드</a>
      <nav class="site-nav">
        <a href="index.html">홈</a>

      </nav>
    </header>

    <main>
      <section class="ball-preview-section">
        <div class="ball-stage">
          <div id="ballPreview" class="wakppul-ball">

      <section class="option-section">

      <section class="option-section">
        <h2>3. 토핑 고르기</h2>
        <div class="option-grid" id="toppingOptions"></div>
      </section>

      <section class="option-section">
        <h2>4. 코팅 고르기</h2>
        <div class="option-grid" id="coatingOptions"></div>
      </section>

      <section class="option-section">
        <h2>5. 오늘의 기분</h2>
        <div class="option-grid" id="emotionOptions"></div>
      </section>

      <p class="form-hint" id="makerHint"></p>
      <button type="button" id="completeBtn" class="btn-primary btn-block">✨ 완성하기</button>
